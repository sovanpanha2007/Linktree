<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Links</title>
  <meta name="description" content="All my links in one place" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Touk Meas';
      src: url('/fonts/Toukmeas-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #fbf9f8;
      --surface:    #ffffff;
      --surface-low:#f5f3f3;
      --navy:       #303030;
      --accent-bg:  #e4e2e2;
      --muted:      #78767d;
      --border:     #303030;
      --radius-sm:  4px;
      --radius-md:  8px;
      --max-w:      420px;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', 'Touk Meas', system-ui, sans-serif;
      color: var(--navy);
    }

    /* ── Main ── */
    main {
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Profile Section ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 40px;
    }
    .avatar-wrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid var(--navy);
      overflow: hidden;
      margin-bottom: 20px;
      flex-shrink: 0;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-name {
      font-family: 'Inter', 'Touk Meas', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .profile-bio {
      font-family: 'Inter', 'Touk Meas', sans-serif;
      font-size: 0.925rem;
      color: var(--navy);
      margin-top: 10px;
      line-height: 1.55;
      max-width: 280px;
    }

    /* ── Links List ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Card ── */
    .link-card {
      display: block;
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--navy);
      border-radius: var(--radius-md);
      padding: 18px 20px 16px;
      position: relative;
      text-decoration: none;
      color: var(--navy);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
      animation: fadeUp 0.4s ease both;
    }
    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 4px 4px 0px 0px var(--navy);
    }
    .link-card:active {
      transform: scale(0.98) translateY(0);
      box-shadow: none;
    }

    /* Floating badge label */
    .card-badge {
      position: absolute;
      top: -12px;
      left: 16px;
      background: var(--accent-bg);
      border: 1px solid var(--navy);
      border-radius: var(--radius-sm);
      padding: 3px 8px;
      font-family: 'Space Mono', 'Touk Meas', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--navy);
      white-space: nowrap;
    }

    /* Card body */
    .card-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title {
      font-family: 'Inter', 'Touk Meas', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
      flex: 1;
    }
    .card-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      transition: transform 0.18s ease;
    }
    .card-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    .link-card:hover .card-icon {
      transform: translateX(3px);
    }


    /* ── Skeleton ── */
    .skeleton-card {
      width: 100%;
      height: 62px;
      background: var(--surface-low);
      border: 1.5px solid var(--accent-bg);
      border-radius: var(--radius-md);
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      padding: 32px 0;
      font-family: 'Space Mono', 'Touk Meas', monospace;
    }

    /* ── Dotted divider ── */
    .dotted-divider {
      background-image: linear-gradient(to right, #c8c5cd 33%, rgba(255,255,255,0) 0%);
      background-position: bottom;
      background-size: 6px 1px;
      background-repeat: repeat-x;
      height: 1px;
      width: 100%;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      padding: 24px 0 0;
    }
    .footer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }
    .footer-label {
      font-family: 'Space Mono', 'Touk Meas', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    /* ── Share toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: #fff;
      font-family: 'Space Mono', 'Touk Meas', monospace;
      font-size: 0.75rem;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>



  <!-- Main -->
  <main>

    <!-- Profile -->
    <section class="profile">
      <div class="avatar-wrap" id="avatarEl">🙂</div>
      <h1 class="profile-name" id="nameEl">—</h1>
      <p class="profile-bio" id="bioEl"></p>
    </section>

    <!-- Links -->
    <div class="links" id="links">
      <!-- Skeleton -->
      <div class="skeleton-card"></div>
      <div class="skeleton-card" style="animation-delay:0.12s"></div>
      <div class="skeleton-card" style="animation-delay:0.24s"></div>
    </div>

    <!-- Dotted Divider -->
    <div class="dotted-divider" style="margin-top: 32px;"></div>

    <!-- Footer -->
    <footer>
      <div class="footer-inner">
        <p class="footer-label">ទាក់ទងមកខ្ញុំ</p>
      </div>
    </footer>

  </main>

  <!-- Share toast -->
  <div class="toast" id="toast">Link copied to clipboard!</div>

  <script>
    // ── Load profile ──
    async function loadProfile() {
      try {
        const res = await fetch('/api/profile');
        const { profile } = await res.json();
        const name = profile.name || 'My Links';
        document.getElementById('nameEl').textContent = name;
        document.getElementById('bioEl').textContent = profile.bio || 'តំណភ្ជាប់ និងការទំនាក់ទំនងរបស់ខ្ញុំ';
        document.title = name + ' — Links';

        if (profile.avatar && profile.avatar.trim()) {
          const wrap = document.getElementById('avatarEl');
          wrap.innerHTML = '';
          const img = document.createElement('img');
          img.src = profile.avatar;
          img.alt = name;
          img.onerror = () => { wrap.textContent = '🙂'; };
          wrap.appendChild(img);
        }
      } catch {
        document.getElementById('nameEl').textContent = 'My Links';
      }
    }

    // ── Load links ──
    async function loadLinks() {
      const container = document.getElementById('links');
      try {
        const res = await fetch('/api/links');
        const { links } = await res.json();
        container.innerHTML = '';

        if (!links || links.length === 0) {
          container.innerHTML = '<p class="empty">✦ Links coming soon</p>';
          return;
        }

        links.forEach((link, i) => {
          const a = document.createElement('a');
          a.href = link.url;
          a.className = 'link-card';
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.style.animationDelay = `${i * 0.07}s`;

          let iconHtml = '';
          if (link.icon) {
            const trimmed = link.icon.trim();
            if (trimmed.toLowerCase().startsWith('<svg')) {
              iconHtml = trimmed.replace('<svg', '<svg style="width: 20px; height: 20px; fill: currentColor;"');
            } else if (trimmed.startsWith('data:image/') || trimmed.startsWith('http://') || trimmed.startsWith('https://')) {
              iconHtml = `<img src="${esc(trimmed)}" style="width: 20px; height: 20px; object-fit: contain;" />`;
            } else {
              iconHtml = esc(trimmed);
            }
          }

          a.innerHTML = `
            <div class="card-badge">${esc(link.title)}</div>
            <div class="card-body">
              <span class="card-title">${esc(link.subtitle || link.title)}</span>
              <span class="card-icon">${iconHtml}</span>
            </div>
          `;

          // Press micro-interaction
          a.addEventListener('mousedown', () => {
            a.style.transform = 'scale(0.98) translateY(0)';
            a.style.boxShadow = 'none';
          });
          a.addEventListener('mouseup',    () => { a.style.transform = ''; a.style.boxShadow = ''; });
          a.addEventListener('mouseleave', () => { a.style.transform = ''; a.style.boxShadow = ''; });

          container.appendChild(a);
        });
      } catch {
        container.innerHTML = '<p class="empty">Could not load links. Please try again.</p>';
      }
    }

    // ── Share page ──
    async function sharePage() {
      try {
        if (navigator.share) {
          await navigator.share({ title: document.title, url: location.href });
        } else {
          await navigator.clipboard.writeText(location.href);
          showToast('Link copied to clipboard!');
        }
      } catch {
        showToast('Link copied!');
      }
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Sanitize HTML ──
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str || '');
      return d.innerHTML;
    }

    loadProfile();
    loadLinks();
  </script>
</body>
</html>
