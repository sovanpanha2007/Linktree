# ============================================================
# Linktree Self-Hosted — Cloudflare Wrangler Config
# ============================================================
# After creating your D1 database, replace YOUR_DB_ID below
# Run: wrangler d1 create linktree-db
# ============================================================

name = "linktree"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# ---- D1 Database ----
[[d1_databases]]
binding     = "DB"
database_name = "linktree-db"
database_id   = "f787f187-7ec7-480e-a09d-61d496f55ab4"   # ← replace this after running: wrangler d1 create linktree-db

# ---- Environment Variables ----
[vars]
# Secret key to access /admin.html — change this to something strong!
ADMIN_SECRET_KEY = "@SovanPanha0"

# Your laptop's IP address (visitors from other IPs cannot open admin)
# Leave as "0.0.0.0" to disable IP check (less secure, key-only auth)
# Find your IP at: https://ifconfig.me
ALLOWED_ADMIN_IP = "0.0.0.0"
